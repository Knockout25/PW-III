<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Operações</title>
</head>

<body>
    <br>
    <table>
        <tr>
            <th></th>
            <th>A</th>
            <th>B</th>
            <th>C</th>
            <th>D</th>
        </tr>
        <tr>
            <td><button onclick="limpar()">Limpar</button></td>
            <td><input type="number" id="A" placeholder="0"></td>
            <td><input type="number" id="B" placeholder="0"></td>
            <td><input type="number" id="C" placeholder="0"></td>
            <td><input type="number" id="D" placeholder="0"></td>
        </tr>
        <tr>
            <td>Paridade</td>
            <td id="paridadeA"></td>
            <td id="paridadeB"></td>
            <td id="paridadeC"></td>
            <td id="paridadeD"></td>
        </tr>
        <tr>
            <td>Dobro</td>
            <td id="dobroA"></td>
            <td id="dobroB"></td>
            <td id="dobroC"></td>
            <td id="dobroD"></td>
        </tr>
        <tr>
            <td>Triplo</td>
            <td id="triploA"></td>
            <td id="triploB"></td>
            <td id="triploC"></td>
            <td id="triploD"></td>
        </tr>
        <tr>
            <td>Quádruplo</td>
            <td id="quadruploA"></td>
            <td id="quadruploB"></td>
            <td id="quadruploC"></td>
            <td id="quadruploD"></td>
        </tr>
        <tr>
            <td>Quíntuplo</td>
            <td id="quintuploA"></td>
            <td id="quintuploB"></td>
            <td id="quintuploC"></td>
            <td id="quintuploD"></td>
        </tr>
        <tr>
            <td>Sêxtuplo</td>
            <td id="sextuploA"></td>
            <td id="sextuploB"></td>
            <td id="sextuploC"></td>
            <td id="sextuploD"></td>
        </tr>
        <tr>
            <td>Quadrado</td>
            <td id="quadradoA"></td>
            <td id="quadradoB"></td>
            <td id="quadradoC"></td>
            <td id="quadradoD"></td>
        </tr>
        <tr>
            <td>Cubo</td>
            <td id="cuboA"></td>
            <td id="cuboB"></td>
            <td id="cuboC"></td>
            <td id="cuboD"></td>
        </tr>
        <tr>
            <td>Quarta potência</td>
            <td id="quartaPotenciaA"></td>
            <td id="quartaPotenciaB"></td>
            <td id="quartaPotenciaC"></td>
            <td id="quartaPotenciaD"></td>
        </tr>
        <tr>
            <td>Quinta potência</td>
            <td id="quintaPotenciaA"></td>
            <td id="quintaPotenciaB"></td>
            <td id="quintaPotenciaC"></td>
            <td id="quintaPotenciaD"></td>
        </tr>
        <tr>
            <td>Sexta potência</td>
            <td id="sextaPotenciaA"></td>
            <td id="sextaPotenciaB"></td>
            <td id="sextaPotenciaC"></td>
            <td id="sextaPotenciaD"></td>
        </tr>
        <tr>
            <td>Bhaskara</td>
            <td id="bhaskara" colspan="4"></td>
        </tr>
        <tr>
            <td>Média aritmética</td>
            <td id="mediaAritmetica" colspan="4"></td>
        </tr>
    </table>
    <script src="scripts/calcular.js"></script>
</body>

</html>
